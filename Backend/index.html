<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JustRation – Central Stock</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body { font-family: 'Inter', sans-serif; }
.sidebar-link { cursor: pointer; }
.sidebar-link:hover { background:#4f46e5; color:white; }
.sidebar-link.active { background:#4f46e5; color:white; }
.sidebar-link.disabled {
    opacity: 0.4;
    cursor: not-allowed;
}
</style>
</head>

<body class="h-screen flex bg-gray-100 overflow-hidden">

<!-- SIDEBAR -->
<aside class="w-20 lg:w-64 bg-white shadow-lg flex flex-col">
    <div class="h-20 flex items-center justify-center bg-gradient-to-r from-blue-600 to-indigo-600 text-white">
        <i class="fas fa-cubes-stacked text-3xl lg:mr-3"></i>
        <span class="hidden lg:inline text-2xl font-extrabold">JustRation</span>
    </div>

    <nav class="mt-8 flex-1 space-y-2 px-2 lg:px-4">

        <a id="nav-dashboard"
           onclick="showView('dashboard')"
           class="sidebar-link active flex items-center justify-center lg:justify-start py-3 px-4 rounded-lg font-semibold">
            <i class="fas fa-tachometer-alt w-6 lg:mr-3"></i>
            <span class="hidden lg:inline">Dashboard</span>
        </a>

        <a id="nav-central"
           onclick="showView('central')"
           class="sidebar-link flex items-center justify-center lg:justify-start py-3 px-4 rounded-lg font-semibold">
            <i class="fas fa-warehouse w-6 lg:mr-3"></i>
            <span class="hidden lg:inline">Central Stock</span>
        </a>

        <a class="sidebar-link disabled flex items-center justify-center lg:justify-start py-3 px-4 rounded-lg font-semibold">
            <i class="fas fa-truck-fast w-6 lg:mr-3"></i>
            <span class="hidden lg:inline">Dispatch</span>
        </a>

        <a class="sidebar-link disabled flex items-center justify-center lg:justify-start py-3 px-4 rounded-lg font-semibold">
            <i class="fas fa-users w-6 lg:mr-3"></i>
            <span class="hidden lg:inline">Distribution</span>
        </a>

        <a class="sidebar-link disabled flex items-center justify-center lg:justify-start py-3 px-4 rounded-lg font-semibold">
            <i class="fas fa-receipt w-6 lg:mr-3"></i>
            <span class="hidden lg:inline">Ledger</span>
        </a>

        <a class="sidebar-link disabled flex items-center justify-center lg:justify-start py-3 px-4 rounded-lg font-semibold">
            <i class="fas fa-cogs w-6 lg:mr-3"></i>
            <span class="hidden lg:inline">Administration</span>
        </a>

    </nav>
</aside>

<!-- MAIN -->
<main class="flex-1 p-8 overflow-y-auto">

<!-- DASHBOARD -->
<div id="dashboardView">
    <h1 class="text-4xl font-extrabold mb-6">Dashboard</h1>
    <div class="bg-white p-8 rounded-xl shadow">
        <p class="text-gray-600">
            Welcome to <b>JustRation</b>.<br>
            Click <b>Central Stock</b> from the sidebar to manage inventory.
        </p>
    </div>
</div>

<!-- CENTRAL STOCK -->
<div id="centralView" class="hidden">
    <h1 class="text-4xl font-extrabold mb-6">Central Stock</h1>

    <div class="bg-white p-6 rounded-xl shadow max-w-xl mb-8">
        <div class="space-y-4">

            <div>
                <label class="font-semibold">Godown</label>
                <select class="w-full border rounded-md p-2">
                    <option>FCI Delhi</option>
                    <option>FCI Mumbai</option>
                </select>
            </div>

            <div>
                <label class="font-semibold">Grain</label>
                <select id="grain" class="w-full border rounded-md p-2">
                    <option>Wheat</option>
                    <option>Rice</option>
                    <option>Sugar</option>
                </select>
            </div>

            <div>
                <label class="font-semibold">Quantity (Kgs)</label>
                <input id="qty" type="number" class="w-full border rounded-md p-2" placeholder="e.g. 5000">
            </div>

            <button onclick="addStock()"
                class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700">
                Add Stock
            </button>
        </div>
    </div>

    <div class="bg-white p-6 rounded-xl shadow max-w-xl">
        <h2 class="text-xl font-bold mb-4">Inventory</h2>
        <ul id="inventory" class="space-y-2"></ul>
    </div>
</div>

</main>

<script>
let stock = {};

function showView(view) {
    // hide all
    document.getElementById('dashboardView').classList.add('hidden');
    document.getElementById('centralView').classList.add('hidden');

    // remove active
    document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));

    // show selected
    if (view === 'dashboard') {
        document.getElementById('dashboardView').classList.remove('hidden');
        document.getElementById('nav-dashboard').classList.add('active');
    } else if (view === 'central') {
        document.getElementById('centralView').classList.remove('hidden');
        document.getElementById('nav-central').classList.add('active');
    }
}

function addStock() {
    const g = document.getElementById('grain').value;
    const q = Number(document.getElementById('qty').value);
    if (!q || q <= 0) return alert("Enter valid quantity");

    stock[g] = (stock[g] || 0) + q;
    renderInventory();
    document.getElementById('qty').value = "";
}

function renderInventory() {
    const list = document.getElementById('inventory');
    list.innerHTML = "";
    for (let g in stock) {
        list.innerHTML += `<li>${g}: <b>${stock[g]} Kgs</b></li>`;
    }
}
</script>

</body>
</html>

<!-- Web3 & Ganache Integration -->
<script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>

<script>
let web3;
let contract;
let account;

// Smart Contract ABI (you'll need to deploy a contract to Ganache first)
const contractABI = [
    {
        "inputs": [{"internalType": "string", "name": "_grain", "type": "string"}, {"internalType": "uint256", "name": "_quantity", "type": "uint256"}],
        "name": "addStock",
        "outputs": [],
        "stateMutability": "nonpayable",
        "type": "function"
    },
    {
        "inputs": [{"internalType": "string", "name": "", "type": "string"}],
        "name": "stock",
        "outputs": [{"internalType": "uint256", "name": "", "type": "uint256"}],
        "stateMutability": "view",
        "type": "function"
    }
];

// Replace with your deployed contract address from Ganache
const contractAddress = "0xYourContractAddressHere";

// Connect to Ganache
async function initWeb3() {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        try {
            await window.ethereum.request({ method: 'eth_requestAccounts' });
        } catch (error) {
            console.error("User denied account access");
        }
    } else if (typeof web3 !== 'undefined') {
        web3 = new Web3(web3.currentProvider);
    } else {
        // Connect directly to Ganache
        web3 = new Web3(new Web3.providers.HttpProvider("http://127.0.0.1:7545"));
    }

    const accounts = await web3.eth.getAccounts();
    account = accounts[0];
    contract = new web3.eth.Contract(contractABI, contractAddress);
    
    console.log("Connected to Ganache. Account:", account);
    loadStockFromBlockchain();
}

// Add stock to blockchain
async function addStockBlockchain(grain, quantity) {
    try {
        await contract.methods.addStock(grain, quantity).send({ from: account, gas: 3000000 });
        console.log("Stock added to blockchain");
        loadStockFromBlockchain();
    } catch (error) {
        console.error("Blockchain error:", error);
        alert("Failed to add stock to blockchain");
    }
}

// Load stock from blockchain
async function loadStockFromBlockchain() {
    const grains = ['Wheat', 'Rice', 'Sugar'];
    stock = {};
    
    for (let grain of grains) {
        try {
            const qty = await contract.methods.stock(grain).call();
            if (qty > 0) {
                stock[grain] = Number(qty);
            }
        } catch (error) {
            console.error(`Error loading ${grain}:`, error);
        }
    }
    renderInventory();
}

// Modified addStock function to use blockchain
async function addStockWithBlockchain() {
    const g = document.getElementById('grain').value;
    const q = Number(document.getElementById('qty').value);
    if (!q || q <= 0) return alert("Enter valid quantity");

    await addStockBlockchain(g, q);
    document.getElementById('qty').value = "";
}

// Initialize on page load
window.addEventListener('load', initWeb3);
</script>

<!-- Update the Add Stock button to use blockchain -->
<script>
// Override the original addStock button
document.addEventListener('DOMContentLoaded', function() {
    const addButton = document.querySelector('button[onclick="addStock()"]');
    if (addButton) {
        addButton.setAttribute('onclick', 'addStockWithBlockchain()');
    }
});
</script>
